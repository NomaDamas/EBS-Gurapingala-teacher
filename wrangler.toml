name = "ebs-gurapingala-teacher"
main = "src/worker.js"
compatibility_date = "2026-07-01"

[[durable_objects.bindings]]
name = "ROOM"
class_name = "ClassroomRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ClassroomRoom"]

[vars]
DEFAULT_FALSE_LEVEL = "5"
DEFAULT_RESPONSE_MODE = "experiment"
DEFAULT_FALSE_DENSITY = "dynamic"
DEFAULT_PERSONA = "일반적인 ChatGPT처럼 자연스럽고 명확한 한국어로 대화한다. 역할극 말투를 쓰지 않는다."
CHAT_RATE_LIMIT_PER_MINUTE = "12"
CHAT_MAX_CONCURRENT = "40"
CHAT_GLOBAL_RATE_LIMIT_PER_MINUTE = "45"
CHAT_MAX_QUEUED_PER_SESSION = "3"
CHAT_QUEUE_WAIT_TIMEOUT_MS = "120000"
CHAT_LEASE_MS = "120000"
ANSWER_CACHE_TTL_MS = "21600000"
ANSWER_CACHE_MAX_ENTRIES = "128"
ANSWER_CACHE_WAIT_TIMEOUT_MS = "120000"
ANSWER_CACHE_LEASE_MS = "180000"
EVENT_TTL_HOURS = "24"
