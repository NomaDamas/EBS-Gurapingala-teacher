name: Disable OpenAI

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  disable:
    name: Remove OpenAI Worker secret
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install locked dependencies
        run: npm ci

      - name: Delete OpenAI Worker secret
        run: printf 'y\n' | npx wrangler secret delete OPENAI_API_KEY
        env:
          CI: "true"
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify OpenAI is disconnected
        run: |
          node - <<'NODE'
          const response = await fetch(process.env.WORKER_HEALTH_URL);
          const health = await response.json();
          if (!response.ok || health.openaiConfigured !== false) {
            console.error("OpenAI Worker secret is still configured.");
            process.exit(1);
          }
          console.log("OpenAI Worker secret removed.");
          NODE
        env:
          WORKER_HEALTH_URL: ${{ vars.WORKER_HEALTH_URL }}
