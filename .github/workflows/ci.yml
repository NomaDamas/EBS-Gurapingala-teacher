name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    name: Verify product gates
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install locked dependencies
        run: npm ci

      - name: Unit tests
        run: node --test

      - name: 20-turn evaluation
        run: node scripts/run-eval.js
        env:
          EVAL_TURN_COUNT: "20"

      - name: Production readiness audit
        run: node scripts/readiness-audit.js

      - name: Worker route smoke
        run: node scripts/smoke-worker.js
