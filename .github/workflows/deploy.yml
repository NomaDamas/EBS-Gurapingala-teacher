name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment label"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - rehearsal

jobs:
  deploy:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Unit tests
        run: node --test

      - name: 50-turn evaluation
        run: node scripts/run-eval.js

      - name: Production readiness audit
        run: node scripts/readiness-audit.js

      - name: Worker route smoke
        run: node scripts/smoke-worker.js

      - name: Deploy Worker
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify health endpoint
        if: ${{ vars.WORKER_HEALTH_URL != '' }}
        run: node scripts/verify-deploy.js
        env:
          WORKER_URL: ${{ vars.WORKER_HEALTH_URL }}
          TEACHER_TOKEN: ${{ secrets.TEACHER_TOKEN }}
          VERIFY_ROOM: ${{ vars.VERIFY_ROOM || 'deploy-verify' }}
          REQUIRE_OPENAI: ${{ vars.REQUIRE_OPENAI || 'true' }}
          REQUIRE_TEACHER_TOKEN: ${{ vars.REQUIRE_TEACHER_TOKEN || 'true' }}
